<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Manager - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --surface2: #1c1c28;
            --border: #2a2a3d;
            --accent: #7c6aff;
            --accent2: #ff6a6a;
            --accent3: #6affb0;
            --text: #e8e8f0;
            --muted: #6b6b8a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(ellipse 80% 50% at 20% 20%, rgba(124,106,255,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 60% 40% at 80% 80%, rgba(106,255,176,0.05) 0%, transparent 60%);
            pointer-events: none;
            z-index: 0;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10,10,15,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }

        .nav-brand {
            font-family: 'Inter', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--text);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            letter-spacing: -0.02em;
        }

        .nav-brand span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }

        .nav-links {
            display: flex;
            gap: 0.25rem;
        }

        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--text);
            background: var(--surface2);
        }

        .nav-links a.active {
            color: var(--accent);
        }

        .nav-logout {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-logout:hover {
            color: var(--text);
            border-color: var(--accent);
        }

        main {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 3rem 2rem;
        }

        .page-header {
            margin-bottom: 3rem;
            animation: fadeUp 0.6s ease both;
        }

        .page-label {
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .page-title {
            font-family: 'Inter', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            margin-bottom: 2.5rem;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.8rem;
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.6s ease both;
            transition: border-color 0.3s, transform 0.3s;
        }

        .stat-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .stat-card:nth-child(2) { animation-delay: 0.1s; }
        .stat-card:nth-child(3) { animation-delay: 0.2s; }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 80px; height: 80px;
            border-radius: 0 16px 0 80px;
            opacity: 0.15;
        }

        .stat-card:nth-child(1)::before { background: var(--accent); }
        .stat-card:nth-child(2)::before { background: var(--accent2); }
        .stat-card:nth-child(3)::before { background: var(--accent3); }

        .stat-label {
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 1rem;
        }

        .stat-value {
            font-family: 'Inter', 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            font-size: 2.0rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1.1;
            white-space: normal;
            overflow-wrap: anywhere;
            word-break: break-all;
            overflow: visible;
            text-overflow: clip;
        }

        .stat-card {
            min-height: 120px;
        }

        .stat-card:nth-child(1) .stat-value { color: var(--accent); }
        .stat-card:nth-child(2) .stat-value { color: var(--accent2); }
        .stat-card:nth-child(3) .stat-value { color: var(--accent3); }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
            animation: fadeUp 0.6s ease 0.3s both;
        }

        .panel-header {
            padding: 1.4rem 1.8rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .panel-title {
            font-family: 'Syne', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            letter-spacing: -0.01em;
        }

        .panel-badge {
            font-size: 0.7rem;
            color: var(--muted);
            letter-spacing: 0.05em;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 0.9rem 1.8rem;
            font-size: 0.65rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            font-weight: 500;
        }

        td {
            padding: 1rem 1.8rem;
            font-size: 0.85rem;
            border-bottom: 1px solid rgba(42,42,61,0.5);
        }

        tr:last-child td { border-bottom: none; }

        tr:hover td { background: var(--surface2); }

        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            font-size: 0.65rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-weight: 500;
        }

        .badge-ok { background: rgba(106,255,176,0.1); color: var(--accent3); border: 1px solid rgba(106,255,176,0.2); }
        .badge-low { background: rgba(255,106,106,0.1); color: var(--accent2); border: 1px solid rgba(255,106,106,0.2); }

        .empty-state {
            padding: 3rem;
            text-align: center;
            color: var(--muted);
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; }
            .page-title { font-size: 2rem; }
        }
    </style>
</head>
<body>
    <nav>
        <a class="nav-brand" href="/"><span></span>Inventory Manager</a>
        <div class="nav-links">
            <a href="/" class="active">Dashboard</a>
            <a href="/products">Products</a>
            <a href="/stocktake">Stock Take</a>
            <a href="/reports">Reports</a>
            <button class="nav-logout" onclick="logout()">Logout</button>
        </div>
    </nav>

    <main>
        <div class="page-header">
            <div class="page-label">Overview</div>
            <h1 class="page-title">Dashboard</h1>
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-label">Total Products</div>
                <div class="stat-value" id="total-products">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Low Stock Alerts</div>
                <div class="stat-value" id="low-stock">—</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Inventory Value</div>
                <div class="stat-value" id="inventory-value">—</div>
            </div>
        </div>

        <div class="panel">
            <div class="panel-header">
                <div class="panel-title">Recent Transactions</div>
                <div class="panel-badge">Last 5 entries</div>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>Product</th>
                        <th>Quantity</th>
                        <th>Type</th>
                        <th>Notes</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody id="transactions-table">
                    <tr><td colspan="5" class="empty-state">No transactions yet</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <script>
        // Auth helpers - paste this at the top of every page's script
        const token = localStorage.getItem('token') || 'bypass';

        function authFetch(url, options = {}) {
            return fetch(url, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': 'Bearer ' + token,
                    ...(options.headers || {})
                }
            });
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login';
        }

        const user = JSON.parse(localStorage.getItem('user') || '{}');

        async function loadDashboard() {
            try {
                const response = await authFetch('/api/dashboard/stats');
                const data = await response.json();

                    document.getElementById('total-products').textContent = Number(data.total_products).toLocaleString();
                document.getElementById('low-stock').textContent = Number(data.low_stock_items).toLocaleString();
                document.getElementById('inventory-value').textContent = 'Kshs ' + Number(data.total_inventory_value).toLocaleString('en-KE', {
                    minimumFractionDigits: 2,
                    maximumFractionDigits: 2
                });

                const tbody = document.getElementById('transactions-table');
                if (data.recent_transactions.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No transactions yet</td></tr>';
                    return;
                }
                tbody.innerHTML = '';
                data.recent_transactions.forEach(t => {
                    const row = tbody.insertRow();
                    row.insertCell(0).textContent = t.product_name || 'Unknown';
                    const qtyCell = row.insertCell(1);
                    qtyCell.textContent = (t.quantity > 0 ? '+' : '') + t.quantity;
                    qtyCell.style.color = t.quantity > 0 ? 'var(--accent3)' : 'var(--accent2)';
                    row.insertCell(2).textContent = t.transaction_type;
                    row.insertCell(3).textContent = t.notes || '—';
                    row.insertCell(4).textContent = new Date(t.timestamp).toLocaleString();
                });
            } catch (e) {
                console.error(e);
            }
        }

        loadDashboard();
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
