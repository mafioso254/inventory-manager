<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Manager - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --surface2: #1c1c28;
            --border: #2a2a3d;
            --accent: #7c6aff;
            --text: #e8e8f0;
            --muted: #6b6b8a;
            --error: #ff6a6a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Mono', monospace;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(ellipse 80% 50% at 50% 50%, rgba(124,106,255,0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .login-box {
            position: relative;
            z-index: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            animation: fadeUp 0.5s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-label {
            font-size: 0.7rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .login-title {
            font-family: 'Syne', sans-serif;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            margin-bottom: 2rem;
        }

        .form-group { margin-bottom: 1.2rem; }

        label {
            display: block;
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.5rem;
        }

        input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            color: var(--text);
            font-family: 'DM Mono', monospace;
            font-size: 0.9rem;
            transition: border-color 0.2s;
            outline: none;
        }

        input:focus { border-color: var(--accent); }

        .btn {
            width: 100%;
            font-family: 'DM Mono', monospace;
            font-size: 0.85rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 0.85rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            background: var(--accent);
            color: white;
            margin-top: 0.5rem;
            transition: all 0.2s;
        }

        .btn:hover { background: #9b8dff; transform: translateY(-1px); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .error-msg {
            background: rgba(255,106,106,0.1);
            border: 1px solid rgba(255,106,106,0.2);
            color: var(--error);
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-size: 0.8rem;
            margin-top: 1rem;
            display: none;
        }

        .error-msg.visible { display: block; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-label">Inventory Manager</div>
        <div class="login-title">Sign In</div>

        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username" autofocus>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>

        <button class="btn" id="login-btn" onclick="doLogin()">Sign In</button>
        <div class="error-msg" id="error-msg"></div>
    </div>

    <script>
        // If already logged in, redirect
        if (localStorage.getItem('token')) {
            window.location.href = '/';
        }

        document.getElementById('password').addEventListener('keydown', e => {
            if (e.key === 'Enter') doLogin();
        });

        async function doLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('login-btn');
            const errorMsg = document.getElementById('error-msg');

            if (!username || !password) {
                showError('Please enter username and password.');
                return;
            }

            btn.disabled = true;
            btn.textContent = 'Signing in...';
            errorMsg.classList.remove('visible');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    window.location.href = '/';
                } else {
                    showError(data.message || 'Login failed.');
                }
            } catch (e) {
                showError('Server error. Is the server running?');
            } finally {
                btn.disabled = false;
                btn.textContent = 'Sign In';
            }
        }

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.classList.add('visible');
        }
    </script>
</body>
</html>
